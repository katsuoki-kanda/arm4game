<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アーム・マスター 60 DUAL PRO Ver4.3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Arial Black', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video { display: none; }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; 
            transform: scaleX(-1);
        }

        .ui-header {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 50;
            pointer-events: none;
        }

        .info-box {
            background: rgba(0,0,0,0.8);
            padding: 8px 30px;
            border-radius: 12px;
            font-size: 28px;
            border: 2px solid;
            font-weight: bold;
            min-width: 250px;
            text-align: center;
        }
        #score-display { color: #00ffcc; border-color: #00ffcc; }
        #timer-display { color: #ff3366; border-color: #ff3366; }

        #command-container {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 20;
            padding: 0 2vw;
        }

        .cmd-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 48%;
        }

        .cmd-label {
            font-size: 4vw;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 5px 20px;
            border-radius: 10px;
            margin-bottom: -2vh;
            z-index: 21;
        }

        .cmd-char {
            font-size: 42vw; 
            font-weight: 900;
            color: #00ff00; 
            text-shadow: 10px 10px 0px #000;
            line-height: 1;
            transition: color 0.1s ease;
        }

        #return-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            font-size: 25vw;
            color: #ff3300;
            font-weight: 900;
            text-shadow: 0 0 50px #000, 0 0 20px #fff;
            display: none;
            z-index: 60;
            white-space: nowrap;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            transition: background 0.5s;
        }

        .overlay.preview-mode {
            background: rgba(0,0,0,0.4);
        }

        .btn-start {
            padding: 20px 50px;
            font-size: 28px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 25px rgba(255,0,0,0.6);
        }

        .guide-text {
            margin-top: 25px;
            font-size: 18px;
            line-height: 1.6;
            color: #fff;
            text-shadow: 0 0 10px #000;
        }
        .highlight { color: #00ff00; font-weight: bold; }
        .warning { color: #ff3366; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>

        <div class="ui-header">
            <div id="score-display" class="info-box">SCORE: <span id="val-score">0</span></div>
            <div id="timer-display" class="info-box">TIME: <span id="val-timer">60</span></div>
        </div>

        <div id="command-container">
            <div class="cmd-box">
                <div id="label-l" class="cmd-label">左</div>
                <div id="cmd-left" class="cmd-char"></div>
            </div>
            <div class="cmd-box">
                <div id="label-r" class="cmd-label">右</div>
                <div id="cmd-right" class="cmd-char"></div>
            </div>
        </div>

        <div id="return-msg">戻して</div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 40px; margin-bottom: 10px;">アーム・マスター 60</h1>
            <h2 style="color: #ffff00; margin-top: 0;">DUAL PRO</h2>
            <button class="btn-start" onclick="initApp()">カメラを起動する</button>
            <div id="setup-guide" class="guide-text">
                カメラを起動して、体が映る位置に調整してください。
            </div>
        </div>

        <div id="result-screen" class="overlay" style="display: none;">
            <h1 id="result-title" style="font-size: 60px; color: #ffcc00; margin-bottom: 0;">TIME UP!</h1>
            <div style="font-size: 50px; margin: 20px 0;">SCORE: <span id="final-score" style="color:#00ff00;">0</span></div>
            <div id="result-guide" class="guide-text" style="background: rgba(0,0,0,0.6); padding: 25px; border-radius: 15px;">
                再び <b>「どちらかの手を挙げて」</b> 元に戻るとリスタート
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const cmdLeftEl = document.getElementById('cmd-left');
        const cmdRightEl = document.getElementById('cmd-right');
        const returnMsg = document.getElementById('return-msg');
        
        const actionOptions = ["前", "上", "後", "外", "内"];
        let currentTarget = { left: "", right: "" };
        
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let waitingForNeutral = false; 
        let isProcessingSuccess = false; 
        let isWaitingForReturn = false; 
        let isCooldown = false; 
        let timerInterval = null;
        let appInitialized = false;

        let handsUpStartTime = null; 
        const EXIT_HOLD_TIME = 4000; 
        const RESTART_COOLDOWN_TIME = 4000;

        let startHand = ""; 
        let shoulderToWristRef = 0.5; // 肩から手首の基準距離

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const synth = window.speechSynthesis;

        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function speak(text) {
            synth.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 2.2;
            synth.speak(uttr);
        }

        function triggerRealStart(landmarks) {
            waitingForNeutral = false;
            gameActive = true;
            isProcessingSuccess = false;
            isWaitingForReturn = false;
            score = 0;
            timeLeft = 60;

            if (landmarks) {
                const lShoulder = landmarks[11];
                const rShoulder = landmarks[12];
                const lWrist = landmarks[15];
                const rWrist = landmarks[16];
                
                const distL = Math.abs(lWrist.y - lShoulder.y);
                const distR = Math.abs(rWrist.y - rShoulder.y);

                if (startHand === "left") {
                    shoulderToWristRef = distR;
                } else if (startHand === "right") {
                    shoulderToWristRef = distL;
                } else {
                    shoulderToWristRef = (distL + distR) / 2;
                }
            }

            document.getElementById('val-score').innerText = score;
            document.getElementById('val-timer').innerText = timeLeft;
            
            playSound(880, 0.5);
            nextCommand();

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('val-timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function prepareStart(handSide) {
            if (gameActive || waitingForNeutral || isCooldown) return;
            startHand = handSide; 
            waitingForNeutral = true;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            
            cmdLeftEl.innerText = "戻";
            cmdRightEl.innerText = "戻";
            cmdLeftEl.style.color = "#00ff00";
            cmdRightEl.style.color = "#00ff00";
        }

        function nextCommand() {
            const newLeft = actionOptions[Math.floor(Math.random() * actionOptions.length)];
            const newRight = actionOptions[Math.floor(Math.random() * actionOptions.length)];
            
            currentTarget = { left: newLeft, right: newRight };
            
            cmdLeftEl.innerText = currentTarget.left;
            cmdRightEl.innerText = currentTarget.right;
            cmdLeftEl.style.color = "#00ff00"; 
            cmdRightEl.style.color = "#00ff00";
            
            returnMsg.style.display = 'none';
            document.getElementById('command-container').style.display = 'flex';

            const pronunciationMap = {
                "上": "うえ", "前": "まえ", "外": "そと", "内": "うち", "後": "うしろ"
            };
            speak(`左、${pronunciationMap[newLeft]}。右、${pronunciationMap[newRight]}`);
        }

        function endGame(isAborted = false) {
            gameActive = false; // これにより背景の黒塗りが解除され映像が映るようになります
            waitingForNeutral = false;
            isWaitingForReturn = false;
            isCooldown = true; 
            startHand = "";
            clearInterval(timerInterval);
            
            const resultScr = document.getElementById('result-screen');
            resultScr.style.display = 'flex';
            resultScr.classList.add('preview-mode'); // 背景を透過させる
            document.getElementById('final-score').innerText = score;
            
            cmdLeftEl.innerText = ""; 
            cmdRightEl.innerText = "";
            returnMsg.style.display = 'none';

            if (isAborted) {
                document.getElementById('result-title').innerText = "QUIT GAME";
                speak("中断しました");
            } else {
                document.getElementById('result-title').innerText = "TIME UP!";
                speak("終了！スコアは" + score + "点です");
            }

            setTimeout(() => { isCooldown = false; }, RESTART_COOLDOWN_TIME);
        }

        function getDistance(a, b) {
            return Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2));
        }

        function onResults(results) {
            canvasElement.width = results.image.width;
            canvasElement.height = results.image.height;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // ゲーム中でない時はカメラ映像を表示
            if (!gameActive) {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                if (results.poseLandmarks) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255,255,255,0.6)', lineWidth: 2});
                    drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#00ff00', radius: 3});
                }
            } else {
                // ゲーム中は集中するため背景を黒にする
                canvasCtx.fillStyle = '#000';
                canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            }

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const lWrist = lm[15], rWrist = lm[16];
                const lShoulder = lm[11], rShoulder = lm[12];
                const lHip = lm[23], rHip = lm[24];

                const UP_THRESH_Y = 0.10;    
                const OUT_THRESH_X = 0.20; 
                const SIDE_THRESH_Y = 0.16; 
                const FRONT_BACK_X_LIMIT = 0.22;

                const currentLDistY = Math.abs(lWrist.y - lShoulder.y);
                const currentRDistY = Math.abs(rWrist.y - rShoulder.y);

                const isLUp = lWrist.y < lShoulder.y - UP_THRESH_Y;
                const isLOut = (lWrist.x > lShoulder.x + OUT_THRESH_X) && Math.abs(lWrist.y - lShoulder.y) < SIDE_THRESH_Y;
                const isLIn = (lWrist.x < rShoulder.x + 0.1) && Math.abs(lWrist.y - lShoulder.y) < SIDE_THRESH_Y * 1.5;
                const isLFront = lWrist.z < -0.4 && Math.abs(lWrist.x - lShoulder.x) < FRONT_BACK_X_LIMIT;
                
                // 【修正】左「後」判定: z軸しきい値を腰 + 0.01、y軸は基準の4/5以下
                const isLBack = (lWrist.z > lHip.z + 0.01) && (currentLDistY <= shoulderToWristRef * 0.85);

                const isRUp = rWrist.y < rShoulder.y - UP_THRESH_Y;
                const isROut = (rWrist.x < rShoulder.x - OUT_THRESH_X) && Math.abs(rWrist.y - rShoulder.y) < SIDE_THRESH_Y;
                const isRIn = (rWrist.x > lShoulder.x - 0.1) && Math.abs(rWrist.y - lShoulder.y) < SIDE_THRESH_Y * 1.5;
                const isRFront = rWrist.z < -0.4 && Math.abs(rWrist.x - rShoulder.x) < FRONT_BACK_X_LIMIT;

                // 【修正】右「後」判定: z軸しきい値を腰 + 0.01、y軸は基準の4/5以下
                const isRBack = (rWrist.z > rHip.z + 0.01) && (currentRDistY <= shoulderToWristRef * 0.85);

                const isNeutral = !isLUp && !isRUp && !isLOut && !isROut && !isLFront && !isRFront && !isLIn && !isRIn && !isLBack && !isRBack;
                const isHandsAtHips = getDistance(lWrist, lHip) < 0.25 && getDistance(rWrist, rHip) < 0.25;

                if (!gameActive && !waitingForNeutral && !isCooldown) {
                    if (isLUp) prepareStart("left");
                    else if (isRUp) prepareStart("right");
                }
                
                if (waitingForNeutral && isNeutral) triggerRealStart(lm);

                if (gameActive) {
                    if (isLUp || isRUp) {
                        if (handsUpStartTime === null) handsUpStartTime = Date.now();
                        else if (Date.now() - handsUpStartTime >= EXIT_HOLD_TIME) { 
                            endGame(true); 
                            handsUpStartTime = null; 
                        }
                    } else { handsUpStartTime = null; }

                    if (isWaitingForReturn) {
                        if (isHandsAtHips || isNeutral) {
                            isWaitingForReturn = false;
                            isProcessingSuccess = false;
                            nextCommand();
                        }
                        canvasCtx.restore();
                        return;
                    }

                    if (!isProcessingSuccess) {
                        let leftMatch = false;
                        switch(currentTarget.left) {
                            case "上": leftMatch = isLUp; break;
                            case "前": leftMatch = isLFront; break;
                            case "外": leftMatch = isLOut; break;
                            case "内": leftMatch = isLIn; break;
                            case "後": leftMatch = isLBack; break;
                        }
                        cmdLeftEl.style.color = leftMatch ? "#ffff00" : "#00ff00";

                        let rightMatch = false;
                        switch(currentTarget.right) {
                            case "上": rightMatch = isRUp; break;
                            case "前": rightMatch = isRFront; break;
                            case "外": rightMatch = isROut; break;
                            case "内": rightMatch = isRIn; break;
                            case "後": rightMatch = isRBack; break;
                        }
                        cmdRightEl.style.color = rightMatch ? "#ffff00" : "#00ff00";

                        if (leftMatch && rightMatch) {
                            isProcessingSuccess = true; 
                            score++;
                            document.getElementById('val-score').innerText = score;
                            playSound(1200, 0.2);
                            document.getElementById('command-container').style.display = 'none';
                            returnMsg.style.display = 'block';
                            setTimeout(() => { isWaitingForReturn = true; }, 200);
                        }
                    }
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });

        function initApp() {
            if (appInitialized) return;
            audioCtx.resume();
            appInitialized = true;
            document.querySelector('.btn-start').style.display = 'none';
            camera.start().then(() => {
                document.getElementById('start-screen').classList.add('preview-mode');
            });
        }
    </script>
</body>
</html>
